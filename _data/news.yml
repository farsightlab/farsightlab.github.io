- when: "2026"
  content: "We have several openings for postdocs, visiting researchers, and PhD students to work on embodied AI, video understanding, and multimodal learning. Prospective applicants should contact [Lorenzo Torresani](mailto:L.Torresani@northeastern.edu) with a CV and a one-page research statement."

